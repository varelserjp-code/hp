<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog — VARELSER</title>
  <meta name="description" content="VARELSER — Blog" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    :root{
      --bg:#fff;
      --fg:#111;
      --muted:rgba(0,0,0,.55);
      --border:rgba(0,0,0,.10);
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI", sans-serif;
    }
    .page{min-height:100svh; display:flex; flex-direction:column; align-items:center;}
    .header{
      width:min(680px, calc(100% - 40px));
      display:flex; flex-direction:column; align-items:center;
      padding:32px 0 24px; gap:12px;
    }
    .site-name{
      font-size:13px; letter-spacing:.18em; color:var(--muted); text-decoration:none;
    }
    .site-name:hover{color:var(--fg);}
    h1{margin:0; font-size:22px; font-weight:600; letter-spacing:.08em;}
    .content{
      width:min(680px, calc(100% - 40px));
      padding:0 0 80px;
      display:flex; flex-direction:column; gap:0;
    }
    .post-item{
      display:block; text-decoration:none; color:var(--fg);
      padding:24px 0;
      border-bottom:1px solid var(--border);
    }
    .post-item:first-child{border-top:1px solid var(--border);}
    .post-item:hover .post-title{opacity:.6;}
    .post-meta{
      display:flex; gap:10px; align-items:center;
      font-size:12px; color:var(--muted); margin-bottom:8px;
      flex-wrap:wrap;
    }
    .category{
      font-size:11px; letter-spacing:.10em; text-transform:uppercase;
      border:1px solid var(--border); border-radius:999px;
      padding:2px 9px; color:var(--muted);
    }
    .post-title{
      font-size:16px; font-weight:600; line-height:1.5;
      margin:0 0 6px; transition:opacity .15s;
    }
    .post-desc{
      font-size:13px; color:var(--muted); margin:0; line-height:1.7;
    }
    .empty{
      font-size:14px; color:var(--muted); padding:40px 0;
    }
    .foot{margin-top:auto; padding:18px 0 24px; color:var(--muted); font-size:12px; text-align:center;}
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="site-name" href="https://varelserjp-code.github.io/hp/">VARELSER</a>
      <h1>Blog</h1>
    </header>

    <main class="content" id="post-list">
      <p class="empty">読み込み中...</p>
    </main>

    <footer class="foot">
      <small>© <span id="y"></span> VARELSER</small>
    </footer>
  </div>

  <script>
    document.getElementById('y').textContent = String(new Date().getFullYear());

    fetch('blog_index.json')
      .then(r => r.json())
      .then(posts => {
        const list = document.getElementById('post-list');

        if (!posts.length) {
          list.innerHTML = '<p class="empty">記事はまだありません。</p>';
          return;
        }

        // 日付の新しい順にソート
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        list.innerHTML = posts.map(post => {
          const date = new Date(post.date).toLocaleDateString('ja-JP', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          const cats = (post.category || []).map(c =>
            `<span class="category">${c}</span>`
          ).join('');

          return `
            <a class="post-item" href="${post.url}">
              <div class="post-meta">
                <span>${date}</span>
                ${cats}
              </div>
              <p class="post-title">${post.title}</p>
              ${post.description ? `<p class="post-desc">${post.description}</p>` : ''}
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('post-list').innerHTML =
          '<p class="empty">記事を読み込めませんでした。</p>';
      });
  </script>
</body>
</html>
