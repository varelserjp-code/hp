<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — VARELSER</title>
  <meta name="description" content="VARELSER — Contact" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    :root{
      --bg:#fff;
      --fg:#111;
      --muted:rgba(0,0,0,.55);
      --border:rgba(0,0,0,.10);
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI", sans-serif;
    }
    .page{min-height:100svh; display:flex; flex-direction:column; align-items:center;}
    .header{
      width:min(680px, calc(100% - 40px));
      display:flex; flex-direction:column; align-items:center;
      padding:32px 0 24px; gap:12px;
    }
    .site-name{
      font-size:13px; letter-spacing:.18em; color:var(--muted); text-decoration:none;
    }
    .site-name:hover{color:var(--fg);}
    h1{ margin:0; font-size:22px; font-weight:600; letter-spacing:.08em; }
    .content{
      width:min(680px, calc(100% - 40px));
      padding:0 0 64px; display:flex; flex-direction:column; gap:40px;
    }
    .label{ font-size:11px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; margin:0 0 14px; }
    .ja{ font-size:15px; line-height:1.85; color:var(--fg); margin:0 0 8px; }
    .en{ font-size:13px; line-height:1.8; color:var(--muted); margin:0; }
    hr{ border:none; border-top:1px solid var(--border); margin:0; }
    .mail-wrap{ margin-top:24px; }
    .foot{margin-top:auto; padding:18px 0 24px; color:var(--muted); font-size:12px;}
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a class="site-name" href="https://varelserjp-code.github.io/hp/">VARELSER</a>
      <h1>Contact</h1>
    </header>

    <main class="content">

      <div class="block">
        <p class="label">Email</p>
        <p class="ja">音楽・作品・コラボレーション・その他のお問い合わせはメールにてご連絡ください。</p>
        <p class="en">For inquiries regarding music, artwork, collaboration, or anything else, please reach out by email.</p>
        <div class="mail-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="260" height="28" role="img" aria-label="varelser.jp at gmail.com">
            <text x="0" y="20" font-family="ui-monospace,'SF Mono',monospace" font-size="15" fill="#111">varelser.jp@gmail.com</text>
          </svg>
        </div>
      </div>

      <hr />

      <div class="block">
        <p class="label">Note</p>
        <p class="ja">返信までお時間をいただく場合があります。</p>
        <p class="en">Please allow some time for a response.</p>
      </div>

    </main>

    <footer class="foot">
      <small>© <span id="y"></span> VARELSER</small>
    </footer>
  </div>
  <script>document.getElementById("y").textContent = String(new Date().getFullYear());</script>
</body>
</html>
