<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nursing News | VARELSER</title>
  <style>
    :root{
      --bg: #fff;
      --fg: #111;
      --muted: rgba(0,0,0,.55);
      --border: #e8e8e8;
      --accent: #0056b3;
      --card-bg: #fafafa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system,
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", sans-serif;
      line-height: 1.8;
      font-size: 16px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 32px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: var(--fg); }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: .02em;
    }
    .page-desc {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 48px;
    }
    article {
      margin-bottom: 56px;
      padding-bottom: 48px;
      border-bottom: 1px solid var(--border);
    }
    article:last-child {
      border-bottom: none;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 10px;
      letter-spacing: .02em;
    }
    .article-title {
      font-size: 19px;
      font-weight: 700;
      margin: 0 0 20px;
      line-height: 1.5;
      letter-spacing: .01em;
    }
    .summary {
      font-size: 15px;
      color: #222;
      line-height: 1.9;
      margin-bottom: 24px;
    }
    .source-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }
    .source-box strong {
      color: var(--fg);
      display: block;
      margin-bottom: 4px;
    }
    .source-box a {
      color: var(--accent);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/hp/" class="back-link">← ホームに戻る</a>
    <p class="page-title">最新の医療・看護ニュース</p>
    <p class="page-desc">海外の最新医療ニュースをAIで要約し、定期配信しています。</p>
<!-- ARTICLES_START -->



<!-- ARTICLES_END -->
  </div>
</body>
</html>
