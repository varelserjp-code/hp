      return new Promise(function(resolve,reject){
        var finished = false;
        var s=document.createElement('script');
        var timer=setTimeout(function(){
          if (finished) return;
          finished = true;
          s.remove();
          reject(new Error('Timeout: ' + src));
        }, Number.isFinite(timeoutMs) ? timeoutMs : 10000);
        s.src=src; s.async=false;
        s.onload=function(){
          if (finished) return;
          finished = true;
          clearTimeout(timer);
          resolve(src);
        };
        s.onerror=function(){
          if (finished) return;
          finished = true;
          clearTimeout(timer);
          s.remove();
          reject(new Error('Failed: ' + src));
        };
        document.head.appendChild(s);
      });
    };
    window.__yayoiLoadAny = async function(urls, test, label){
      var lastError = null;
      for (const url of urls) {
        try {
          await window.__yayoiLoadScript(url, 10000);
          if (!test || test()) {
            if (label) window.__yayoiLoadedScripts[label] = url;
            return url;
          }
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('All script sources failed');
    };

      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    };

    const buildExportFilename = (extension, prefix = 'yayoi') => `${prefix}_${formatExportTimestamp()}.${extension}`;

    const downloadBlob = (blob, filename) => {
      if (!blob) throw new Error('Failed to create export blob.');
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = objectUrl;
      link.download = filename;
      link.rel = 'noopener';
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    };

    const canvasToBlob = (canvas, type = 'image/png') => new Promise((resolve, reject) => {
      if (!canvas || typeof canvas.toBlob !== 'function') {
        reject(new Error('Canvas export is not available in this browser.'));
        return;
      }
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error(`Canvas returned an empty ${type} blob.`));
      }, type);
    });

    const escapeXML = (value) => String(value)

    const fmt = (value) => {
      if (!Number.isFinite(value)) return '0';
      const rounded = Math.abs(value) < 0.000001 ? 0 : value;
      return Number(rounded.toFixed(4)).toString();
    };

    const getCirclePathData = (radius) => {
      const r = Math.max(0, radius);
      return `M ${fmt(-r)} 0 A ${fmt(r)} ${fmt(r)} 0 1 0 ${fmt(r)} 0 A ${fmt(r)} ${fmt(r)} 0 1 0 ${fmt(-r)} 0 Z`;
    };

    const getRingPathData = (radius) => {
      const outer = Math.max(0, radius);
      const inner = outer * 0.6;
      return `${getCirclePathData(outer)} ${getCirclePathData(inner)}`;
    };

    const getShapePathData = (type, radius) => {
      if (type === ShapeType.Circle) return getCirclePathData(radius);
      if (type === ShapeType.Square) {
        const pr = Math.max(0, radius);
        return `M ${fmt(-pr)} ${fmt(-pr)} H ${fmt(pr)} V ${fmt(pr)} H ${fmt(-pr)} Z`;
      }
      if (type === ShapeType.Ring) return getRingPathData(radius);
      return getSVGPathData(type, radius) || getCirclePathData(radius);

    // ----------------------------------------------------------------------
    // RENDER / MATH HELPERS (ported from App.tsx + bugfixes)
    // ----------------------------------------------------------------------
    const getPolygonVertices = (r, sides, rotationOffset = -Math.PI / 2) => {
      const points = [];
      for (let i = 0; i < sides; i++) {
        const angle = rotationOffset + (i * 2 * Math.PI) / sides;
        points.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
      }
      return points;
    };

    const getStarVertices = (r, points, inset) => {
      const pts = [];
      for (let i = 0; i < points * 2; i++) {
        const rot = (Math.PI / points) * i;
        const dist = i % 2 === 0 ? r : r * inset;
        const angle = rot - Math.PI / 2;
        pts.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
      }
      return pts;
    };

    const getShapeVertices = (type, r) => {
      switch (type) {
        case ShapeType.Square:   return getPolygonVertices(r, 4, -Math.PI / 4);
        case ShapeType.Triangle: return getPolygonVertices(r, 3);
        case ShapeType.Pentagon: return getPolygonVertices(r, 5);
        case ShapeType.Hexagon:  return getPolygonVertices(r, 6);
        case ShapeType.Octagon:  return getPolygonVertices(r, 8);
        case ShapeType.Diamond:  return [{ x: 0, y: -r }, { x: r * 0.7, y: 0 }, { x: 0, y: r }, { x: -r * 0.7, y: 0 }];
        case ShapeType.Star:     return getStarVertices(r, 5, 0.4);
        case ShapeType.Cross: {
          const w = r * 0.35;
          return [
            { x: -w, y: -r }, { x: w, y: -r }, { x: w, y: -w }, { x: r, y: -w }, { x: r, y: w },
            { x: w, y: w }, { x: w, y: r }, { x: -w, y: r }, { x: -w, y: w }, { x: -r, y: w },
            { x: -r, y: -w }, { x: -w, y: -w }
          ];
        }
        case ShapeType.Arrow: {
          const w = r * 0.5;
          return [
            { x: 0, y: -r }, { x: r, y: 0 }, { x: w, y: 0 }, { x: w, y: r },
            { x: -w, y: r }, { x: -w, y: 0 }, { x: -r, y: 0 }
          ];
        }
        case ShapeType.Heart: {
          const pts = [];
          const res = 60;
          for (let i = 0; i < res; i++) {
            const t = (i / res) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            const scale = r / 16;
            pts.push({ x: x * scale, y: y * scale });
          }
          return pts;
        }
        default:
          return [];
      }
    };

    const isPointInPolygon = (p, vertices) => {
      let inside = false;
      for (let i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
        const xi = vertices[i].x, yi = vertices[i].y;
        const xj = vertices[j].x, yj = vertices[j].y;
        const intersect = ((yi > p.y) !== (yj > p.y)) && (p.x < (xj - xi) * (p.y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    };

    const getPointOnPolygonPerimeter = (t, vertices) => {
      if (vertices.length < 2) return { x: 0, y: 0 };
      const lengths = [];
      let totalLength = 0;
      for (let i = 0; i < vertices.length; i++) {
        const next = vertices[(i + 1) % vertices.length];
        const dist = Math.hypot(next.x - vertices[i].x, next.y - vertices[i].y);
        lengths.push(dist);
        totalLength += dist;
      }
      if (totalLength === 0) return vertices[0];
      const targetDist = t * totalLength;
      let currentDist = 0;
      for (let i = 0; i < vertices.length; i++) {
        const len = lengths[i];
        if (currentDist + len >= targetDist - 0.001) {
          const segmentT = len > 0 ? (targetDist - currentDist) / len : 0;
          const v1 = vertices[i];
          const v2 = vertices[(i + 1) % vertices.length];
          return { x: v1.x + (v2.x - v1.x) * segmentT, y: v1.y + (v2.y - v1.y) * segmentT };
        }
        currentDist += len;
      }
      return vertices[0];
    };

    const getSVGPathData = (type, r) => {
      const round = (n) => Math.round(n * 100) / 100;
      if (type === ShapeType.Circle) return '';
      if (type === ShapeType.Ring) {
        const R = r;
        const r2 = r * 0.6;
        return `M ${round(R)} 0 A ${round(R)} ${round(R)} 0 1 0 ${round(-R)} 0 A ${round(R)} ${round(R)} 0 1 0 ${round(R)} 0 Z ` +
               `M ${round(r2)} 0 A ${round(r2)} ${round(r2)} 0 1 1 ${round(-r2)} 0 A ${round(r2)} ${round(r2)} 0 1 1 ${round(r2)} 0 Z`;
      }
      if (type === ShapeType.Heart) {
        const s = r / 1.5;
        return `M 0 ${-round(s * 0.5)} C ${round(s)} ${-round(s * 1.5)}, ${round(s * 2)} ${-round(s * 0.5)}, 0 ${round(s * 1.5)} ` +
               `C ${-round(s * 2)} ${-round(s * 0.5)}, ${-round(s)} ${-round(s * 1.5)}, 0 ${-round(s * 0.5)} Z`;
      }
      const v = getShapeVertices(type, r);
      if (v.length > 0) return `M ${v.map((p) => `${round(p.x)} ${round(p.y)}`).join(' L ')} Z`;
      return '';
    };

    const createLCG = (seed) => {
      let state = seed % 2147483647;
      if (state <= 0) state += 2147483646;
      return () => {
        state = (state * 48271) % 2147483647;
        return state / 2147483647;
      };
    };

    const getRandomColor = (rng) => {
      const h = Math.floor(rng() * 360);
      const s = 70 + Math.floor(rng() * 30);
      const l = 50 + Math.floor(rng() * 20);
      return `hsl(${h}, ${s}%, ${l}%)`;
    };

    const rotate3D = (x, y, z, angleX, angleY) => {
      const radX = (angleX * Math.PI) / 180;
      const radY = (angleY * Math.PI) / 180;
      const x1 = x * Math.cos(radY) - z * Math.sin(radY);
      const z1 = x * Math.sin(radY) + z * Math.cos(radY);
      const y1 = y;
      const y2 = y1 * Math.cos(radX) - z1 * Math.sin(radX);
      const z2 = y1 * Math.sin(radX) + z1 * Math.cos(radX);
      return { x: x1, y: y2, z: z2 };
    };

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return html`
            <div className="flex items-center justify-center h-screen w-screen bg-black text-red-500 flex-col p-4 text-center">
              <h2 className="text-xl font-bold mb-2">Renderer Crashed</h2>
              <pre className="text-xs opacity-70 whitespace-pre-wrap">${String(this.state.error?.message || this.state.error)}</pre>
            </div>
          `;
        }
        return this.props.children;
      }
    }

    // ----------------------------------------------------------------------
    // MAIN APP
    // ----------------------------------------------------------------------
    const AppContent = () => {
      const canvasRef = useRef(null);
      const dragStateRef = useRef({ pointerId: null, x: 0, y: 0 });
      const [shapes, setShapes] = useState([]);
      const [activeTab, setActiveTab] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [config, setConfig] = useState(DEFAULT_CONFIG);
      const generationConfigDependencies = GENERATION_CONFIG_KEYS.map((key) => config[key]);
      const generationConfig = useMemo(() => pickConfigSubset(config, GENERATION_CONFIG_KEYS), generationConfigDependencies);

      useEffect(() => {
        const fallback = document.getElementById('loading-fallback');
        if (fallback) {
          fallback.style.opacity = '0';
          setTimeout(() => fallback.remove(), 350);
        }
      }, []);

      const generateShapes = useCallback(() => {
        const config = generationConfig;
        const newShapes = [];
        const rng = createLCG(config.seed);
        const shapePool = (config.layoutMode === LayoutMode.Random) ? (config.randomShapes || config.activeShapes) : config.activeShapes;
        const availableShapes = (shapePool && shapePool.length > 0) ? shapePool : [ShapeType.Circle];
        const pickShapeType = () => availableShapes[Math.floor(rng() * availableShapes.length)];

        const pickColor = (type) => {
          if (config.colorMode === 'random') return getRandomColor(rng);
          if (config.colorMode === 'per-shape') return config.shapeColors[type] || '#ffffff';
          return config.baseColor;
        };

        const calculateSize = (type, t) => {
          if (config.sizeMode === 'fixed') return config.minRadius;
          if (config.sizeMode === 'per-shape') return config.shapeSizes[type] || config.minRadius;
          if (config.sizeMode === 'linear') {
            let linearT = t;
            if (config.linearStyle === 'center') linearT = Math.abs(t - 0.5) * 2;
            if (config.reverseSize) linearT = 1.0 - linearT;
            return config.minRadius + (config.maxRadius - config.minRadius) * linearT;
          }
          if (config.syncRadius) return config.minRadius;
          const min = config.minRadius;
          const max = config.maxRadius;
          return (min === max) ? min : (min + rng() * (max - min));
        };

        const spreadXScale = config.spreadX / 100;
        const spreadYScale = config.spreadY / 100;

        if (config.layoutMode === LayoutMode.Solid) {
          const baseR = (Math.min(config.width, config.height) / 2) * (config.layoutScale / 100);
          const maxActiveShapeRadius = (() => {
            if (config.sizeMode === 'fixed') return config.minRadius;
            if (config.sizeMode === 'per-shape') {
              const list = (config.activeShapes && config.activeShapes.length) ? config.activeShapes : [ShapeType.Circle];
              let r = 0;
              for (const t of list) r = Math.max(r, (config.shapeSizes && config.shapeSizes[t]) ? config.shapeSizes[t] : 0);
              return Math.max(r || 0, config.minRadius);
            }
            return Math.max(config.minRadius, config.maxRadius);
          })();
          const strokePad = config.useStroke ? 3 : 0;
          const R = Math.max(2, baseR - (maxActiveShapeRadius + strokePad) * 1.1);
          const isVolume = config.solidDistribution === 'volume';

          let sphereSurfacePoints = null;
          if (config.solidShape === SolidShapeType.Sphere && !isVolume) {
            const target = Math.max(1, config.count);
            const pts = [];
            // Ring-grid on sphere surface (latitudinal bands with staggered longitudes)
            const rings = Math.max(2, Math.round(Math.sqrt(target / 4)));
            for (let r = 0; r < rings && pts.length < target; r++) {
              const v = (r + 0.5) / rings;
              const phiR = Math.PI * v;
              const yR = -Math.cos(phiR) * R;
              const ringRadius = Math.sin(phiR) * R;
              let n = Math.max(1, Math.round(2 * Math.PI * rings * Math.sin(phiR)));
              n = Math.min(n, target - pts.length);
              const offset = (r % 2) ? (Math.PI / n) : 0;
              for (let j = 0; j < n && pts.length < target; j++) {
                const theta = offset + (j / n) * Math.PI * 2;
                pts.push({ x: Math.cos(theta) * ringRadius, y: yR, z: Math.sin(theta) * ringRadius });
              }
            }
            // Backfill (rare, tiny targets) with Fibonacci
            if (pts.length < target) {
              const golden = Math.PI * (3 - Math.sqrt(5));
              for (let k = pts.length; k < target; k++) {
                const yPos = 1 - (k / Math.max(1, (target - 1))) * 2;
                const radiusAtY = Math.sqrt(Math.max(0, 1 - yPos * yPos));
                const theta = golden * k;
                pts.push({ x: Math.cos(theta) * radiusAtY * R, y: yPos * R * -1, z: Math.sin(theta) * radiusAtY * R });
              }
            }
            sphereSurfacePoints = pts;
          }


          for (let i = 0; i < config.count; i++) {
            let x = 0, y = 0, z = 0, t = 0;
            let rotation = 0;

            if (config.solidShape === SolidShapeType.Sphere) {
              if (!isVolume) {
                if (sphereSurfacePoints && sphereSurfacePoints[i]) {
                  const p = sphereSurfacePoints[i];
                  x = p.x;
                  y = p.y;
                  z = p.z;
                } else {
                  const phi = Math.PI * (3 - Math.sqrt(5));
                  const yPos = 1 - (i / Math.max(1, (config.count - 1))) * 2;
                  const radiusAtY = Math.sqrt(Math.max(0, 1 - yPos * yPos));
                  const theta = phi * i;
                  x = Math.cos(theta) * radiusAtY * R;
                  y = yPos * R * -1;
                  z = Math.sin(theta) * radiusAtY * R;
                }
                t = (y + R) / (2 * R);
              } 
              else {
                const u = rng();
                const v = rng();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                const radius = R * Math.cbrt(rng());
                x = radius * Math.sin(phi) * Math.cos(theta);
                z = radius * Math.sin(phi) * Math.sin(theta);
                y = radius * Math.cos(phi);
                t = (y + R) / (2 * R);
              }
            } else if (config.solidShape === SolidShapeType.Cube) {
              const size = R;
              if (!isVolume) {
                const face = Math.floor(rng() * 6);
                const u = (rng() - 0.5) * 2 * size;
                const v = (rng() - 0.5) * 2 * size;
                switch (face) {
                  case 0: x =  size; y = u;    z = v;    break;
                  case 1: x = -size; y = u;    z = v;    break;
                  case 2: x = u;    y =  size; z = v;    break;
                  case 3: x = u;    y = -size; z = v;    break;
                  case 4: x = u;    y = v;     z =  size;break;
                  case 5: x = u;    y = v;     z = -size;break;
                  default: break;
                }
              } else {
                x = (rng() - 0.5) * 2 * size;
                y = (rng() - 0.5) * 2 * size;
                z = (rng() - 0.5) * 2 * size;
              }
              t = (y + size) / (2 * size);
            } else if (config.solidShape === SolidShapeType.Torus) {
              const majorR = R * 0.7;
              const minorR = R * 0.3;
              const u = rng() * Math.PI * 2;
              const v = rng() * Math.PI * 2;
              let rOffset = minorR;
              if (isVolume) rOffset = minorR * Math.sqrt(rng());
              x = (majorR + rOffset * Math.cos(v)) * Math.cos(u);
              z = (majorR + rOffset * Math.cos(v)) * Math.sin(u);
              y = rOffset * Math.sin(v);
              t = (y + minorR) / (2 * minorR);
            } else if (config.solidShape === SolidShapeType.Cone) {
              const h = R * 2;
              const rBase = R;
              if (!isVolume) {
                const theta = rng() * Math.PI * 2;
                const hRatio = Math.sqrt(rng());
                const curH = h * hRatio;
                const curR = rBase * (1 - hRatio);
                y = curH - h / 2;
                x = curR * Math.cos(theta);
                z = curR * Math.sin(theta);
              } else {
                const hRatio = rng();
                const curH = h * hRatio;
                const maxR = rBase * (1 - hRatio);
                const rPos = maxR * Math.sqrt(rng());
                const theta = rng() * Math.PI * 2;
                y = curH - h / 2;
                x = rPos * Math.cos(theta);
                z = rPos * Math.sin(theta);
              }
              t = (y + h / 2) / h;
            }

            x *= spreadXScale;
            y *= spreadYScale;
            t = Math.max(0, Math.min(1, t));

            if (config.linearDirection === 'horizontal') {
              const bound = R;
              t = (x + bound) / (2 * bound);
              t = Math.max(0, Math.min(1, t));
            }

            const type = pickShapeType();
            newShapes.push({
              id: `solid-${i}`,
              x, y, z,
              baseRadius: calculateSize(type, t),
              type,
              rotation,
              color: pickColor(type),
            });
          }
        } else if (config.layoutMode === LayoutMode.Grid) {
          const { gridX, gridY, gridZ } = config;
          const w = config.width * spreadXScale;
          const h = config.height * spreadYScale;
          const d = config.depth;
          const safeGridX = Math.min(gridX, 30);
          const safeGridY = Math.min(gridY, 30);

          for (let iz = 0; iz < gridZ; iz++) {
            for (let iy = 0; iy < safeGridY; iy++) {
              for (let ix = 0; ix < safeGridX; ix++) {
                const nx = safeGridX > 1 ? ix / (safeGridX - 1) : 0.5;
                const ny = safeGridY > 1 ? iy / (safeGridY - 1) : 0.5;
                const nz = gridZ > 1 ? iz / (gridZ - 1) : 0.5;

                const x = (nx - 0.5) * w;
                const y = (ny - 0.5) * h;
                const z = (nz - 0.5) * d;

                const t = (config.linearDirection === 'horizontal') ? nx : ny;
                const type = pickShapeType();
                newShapes.push({
                  id: `grid-${ix}-${iy}-${iz}`,
                  x, y, z,
                  baseRadius: calculateSize(type, t),
                  type,
                  rotation: rng() * Math.PI * 2,
                  color: pickColor(type),
                });
              }
            }
          }
        } else if (config.layoutMode === LayoutMode.Shape) {
          const guideBaseSize = Math.min(config.width, config.height) * 0.45;
          const guideRadius = guideBaseSize * (config.layoutScale / 100);
          const guideType = config.layoutShape;

          let guideVertices = [];
          const isRadial = (guideType === ShapeType.Circle || guideType === ShapeType.Ring);
          if (!isRadial) guideVertices = getShapeVertices(guideType, guideRadius);

          if (config.shapeDistribution === 'fill-grid') {
            // Clean, even grid clipped to the guide shape.
            // Uses existing Grid X/Y controls (columns/rows) but improves aesthetics by:
            // - keeping shapes fully inside the guide (padding by max radius + stroke)
            // - staggering every other row for better packing (hex-like)
            const cols = Math.max(2, (config.gridX | 0));
            const rows = Math.max(2, (config.gridY | 0));

            const maxActiveShapeRadius = (() => {
              // Worst-case radius used to keep shapes from crossing the guide boundary.
              if (config.sizeMode === 'fixed') return config.minRadius;
              if (config.sizeMode === 'per-shape') {
                const list = (config.activeShapes && config.activeShapes.length) ? config.activeShapes : [ShapeType.Circle];
                let r = 0;
                for (const t of list) r = Math.max(r, (config.shapeSizes && config.shapeSizes[t]) ? config.shapeSizes[t] : 0);
                return Math.max(r || 0, config.minRadius);
              }
              return Math.max(config.minRadius, config.maxRadius);
            })();

            const strokePad = config.useStroke ? 3 : 0;
            const pad = (maxActiveShapeRadius + strokePad) * 1.05;
            const effR = Math.max(2, guideRadius - pad);

            const stepX = (effR * 2) / (cols - 1);
            const stepY = (effR * 2) / (rows - 1);
            const startX = -effR;
            const startY = -effR;

            // Slightly expand for inside test (numerical safety)
            const checkR = effR * 1.0005;
            let checkVertices = [];
            if (!isRadial) checkVertices = getShapeVertices(guideType, checkR);

            let idx = 0;
            for (let iy = 0; iy < rows; iy++) {
              const rowOffset = (iy % 2) ? (stepX * 0.5) : 0;
              const ry = startY + iy * stepY;

              for (let ix = 0; ix < cols; ix++) {
                const rx = startX + ix * stepX + rowOffset;

                let isInside = false;
                if (isRadial) {
                  isInside = (rx * rx + ry * ry) <= (checkR * checkR);
                } else {
                  isInside = isPointInPolygon({ x: rx, y: ry }, checkVertices);
                }
                if (!isInside) continue;

                const x = rx * spreadXScale;
                const y = ry * spreadYScale;
                const z = 0;

                const tx = Math.max(0, Math.min(1, (rx + effR) / (effR * 2)));
                const ty = Math.max(0, Math.min(1, (ry + effR) / (effR * 2)));
                const t = (config.linearDirection === 'horizontal') ? tx : ty;

                const type = pickShapeType();
                newShapes.push({
                  id: `s-grid-${idx++}`,
                  x, y, z,
                  baseRadius: calculateSize(type, t),
                  type,
                  rotation: 0,
                  color: pickColor(type),
                });
              }
            }
          } else {
            for (let i = 0; i < config.count; i++) {
              let x = 0, y = 0, t = 0, z = 0, rotation = 0;

              if (config.shapeDistribution === 'stroke-linear') {
                t = i / config.count;
                if (isRadial) {
                  const angle = t * Math.PI * 2 - Math.PI / 2;
                  x = guideRadius * Math.cos(angle);
                  y = guideRadius * Math.sin(angle);
                } else {
                  const pt = getPointOnPolygonPerimeter(t, guideVertices);
                  x = pt.x; y = pt.y;
                }
              } else if (config.shapeDistribution === 'stroke-random') {
                t = rng();
                if (isRadial) {
                  const angle = t * Math.PI * 2 - Math.PI / 2;
                  x = guideRadius * Math.cos(angle);
                  y = guideRadius * Math.sin(angle);
                } else {
                  const pt = getPointOnPolygonPerimeter(t, guideVertices);
                  x = pt.x; y = pt.y;
                }
                z = (rng() - 0.5) * config.depth;
                rotation = rng() * Math.PI * 2;
              } else if (config.shapeDistribution === 'fill-random') {
                // Random fill, but keep shapes fully inside the guide by padding with max radius + stroke.
                const maxActiveShapeRadius = (() => {
                  if (config.sizeMode === 'fixed') return config.minRadius;
                  if (config.sizeMode === 'per-shape') {
                    const list = (config.activeShapes && config.activeShapes.length) ? config.activeShapes : [ShapeType.Circle];
                    let r = 0;
                    for (const t of list) r = Math.max(r, (config.shapeSizes && config.shapeSizes[t]) ? config.shapeSizes[t] : 0);
                    return Math.max(r || 0, config.minRadius);
                  }
                  return Math.max(config.minRadius, config.maxRadius);
                })();
                const strokePad = config.useStroke ? 3 : 0;
                const pad = (maxActiveShapeRadius + strokePad) * 1.05;
                const effR = Math.max(2, guideRadius - pad);
                const checkR = effR * 1.0005;
                const checkVertices = (!isRadial) ? getShapeVertices(guideType, checkR) : null;

                let found = false;
                let attempts = 0;
                while (!found && attempts < 400) {
                  const rx = (rng() - 0.5) * 2 * effR;
                  const ry = (rng() - 0.5) * 2 * effR;
                  if (isRadial) {
                    if (rx * rx + ry * ry <= checkR * checkR) { x = rx; y = ry; found = true; }
                  } else {
                    if (isPointInPolygon({ x: rx, y: ry }, checkVertices)) { x = rx; y = ry; found = true; }
                  }
                  attempts++;
                }
                if (!found) { x = 0; y = 0; }

                t = (y + effR) / (effR * 2);
                if (config.linearDirection === 'horizontal') t = (x + effR) / (effR * 2);
                z = (rng() - 0.5) * config.depth;
                rotation = rng() * Math.PI * 2;
              }

              t = Math.max(0, Math.min(1, t));
              const finalX = x * spreadXScale;
              const finalY = y * spreadYScale;

              const type = pickShapeType();
              newShapes.push({
                id: `s-${i}`,
                x: finalX,
                y: finalY,
                z,
                baseRadius: calculateSize(type, t),
                type,
                rotation,
                color: pickColor(type),
              });
            }
          }
        } else {
          // Random
          for (let i = 0; i < config.count; i++) {
            const x = (rng() - 0.5) * config.width * spreadXScale;
            const y = (rng() - 0.5) * config.height * spreadYScale;
            const z = (rng() - 0.5) * config.depth;

            let t = 0;
            if (config.linearDirection === 'horizontal') {
              const limit = (config.width * spreadXScale) / 2;
              t = limit > 0 ? (x + limit) / (limit * 2) : 0.5;
            } else {
              const limit = (config.height * spreadYScale) / 2;
              t = limit > 0 ? (y + limit) / (limit * 2) : 0.5;
            }
            t = Math.max(0, Math.min(1, t));

            const type = pickShapeType();
            newShapes.push({
              id: `rnd-${i}`,
              x, y, z,
              baseRadius: calculateSize(type, t),
              type,
              rotation: rng() * Math.PI * 2,
              color: pickColor(type),
            });
          }
        }

        setShapes(newShapes);
      }, [generationConfig]);

      useEffect(() => { generateShapes(); }, [generateShapes]);

      const handleRegenerate = () => setConfig((prev) => ({ ...prev, seed: Date.now() }));

      const project = useCallback((x, y, z, cx, cy, rotX, rotY) => {
        const rotated = rotate3D(x, y, z, rotX, rotY);
        const viewDistance = Math.max(config.depth, 2500);
        const cameraZ = rotated.z + viewDistance;
        const scale = (1500 / (1500 + cameraZ)) * config.zoom;
        return { x: rotated.x * scale + cx, y: rotated.y * scale + cy, z: cameraZ, scale };
      }, [config.depth, config.zoom]);

      const renderToContext = (ctx, width, height, renderList, renderConfig = config) => {
        ctx.clearRect(0, 0, width, height);
        if (renderConfig.useBackground) {
          ctx.fillStyle = renderConfig.backgroundColor;
          ctx.fillRect(0, 0, width, height);
        }
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.globalAlpha = renderConfig.opacity;
        ctx.globalCompositeOperation = renderConfig.blendMode;

        if (renderConfig.useShadow) {
          ctx.shadowBlur = renderConfig.shadowBlur;
          ctx.shadowColor = renderConfig.shadowColor;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;
        } else {
          ctx.shadowBlur = 0;
          ctx.shadowColor = 'transparent';
        }

        for (const shape of renderList) {
          const pr = shape.baseRadius * shape.scale;
          if (shape.pz < 0 || pr < 0.5) continue;

          ctx.save();
          ctx.translate(shape.px, shape.py);
          ctx.rotate(shape.rotation);

          const pathData = getShapePathData(shape.type, pr);
          const path = new Path2D(pathData);
          const fillRule = getShapeFillRule(shape.type);
          const strokeWidth = Number(getStrokeWidthForScale(shape.scale));

          ctx.fillStyle = shape.color;
          ctx.fill(path, fillRule);
          if (renderConfig.useStroke) {
            ctx.strokeStyle = renderConfig.strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.stroke(path);
          }

          ctx.restore();
        }

        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;

        if (renderConfig.showAxes) {
          const spreadXScale2 = renderConfig.spreadX / 100;
          const spreadYScale2 = renderConfig.spreadY / 100;
          const w = renderConfig.width * spreadXScale2;
          const h = renderConfig.height * spreadYScale2;
          const d = renderConfig.depth;
          const cx = renderConfig.width / 2;
          const cy = renderConfig.height / 2;
          const rotX = renderConfig.rotationX;
          const rotY = renderConfig.rotationY;

          ctx.lineWidth = 2;
          ctx.font = `bold ${Math.max(14, renderConfig.width / 80)}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          const drawAxis = (x1, y1, z1, x2, y2, z2, color, label) => {
            const p1 = project(x1, y1, z1, cx, cy, rotX, rotY);
            const p2 = project(x2, y2, z2, cx, cy, rotX, rotY);
            if (p1.z <= 10 || p2.z <= 10) return;

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();

            ctx.fillStyle = color;
            ctx.fillText(label, p2.x, p2.y);
          };

          drawAxis(-w / 2, 0, 0, w / 2, 0, 0, '#ff4444', 'X');
          drawAxis(0, -h / 2, 0, 0, h / 2, 0, '#44ff44', 'Y');
          drawAxis(0, 0, -d / 2, 0, 0, d / 2, '#4444ff', 'Z');
        }
      };

      const createRenderList = useCallback(() => {
        const cx = config.width / 2;
        const cy = config.height / 2;
        return shapes
          .map((s) => {
            const p = project(s.x, s.y, s.z, cx, cy, config.rotationX, config.rotationY);
            return { ...s, px: p.x, py: p.y, pz: p.z, scale: p.scale };
          })
          .sort((a, b) => b.pz - a.pz);
      }, [shapes, project, config.width, config.height, config.rotationX, config.rotationY]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        renderToContext(ctx, config.width, config.height, createRenderList());
      }, [config, createRenderList]);

      const exportPNG = useCallback(async ({ filename, forceTransparent = false } = {}) => {
        const renderList = createRenderList();
        const exportCanvas = document.createElement('canvas');
        const exportSize = clampExportDimensions(config.width, config.height);
        exportCanvas.width = exportSize.width;
        exportCanvas.height = exportSize.height;
        const exportContext = exportCanvas.getContext('2d');
        if (!exportContext) throw new Error('Failed to acquire export canvas context.');

        exportContext.setTransform(1, 0, 0, 1, 0, 0);
        exportContext.clearRect(0, 0, exportCanvas.width, exportCanvas.height);
        if (exportSize.scale !== 1) {
          exportContext.setTransform(exportSize.scale, 0, 0, exportSize.scale, 0, 0);
        }

        const exportConfig = forceTransparent && config.useBackground
          ? { ...config, useBackground: false }
          : config;

        renderToContext(exportContext, config.width, config.height, renderList, exportConfig);
        exportContext.setTransform(1, 0, 0, 1, 0, 0);

        const blob = await canvasToBlob(exportCanvas, 'image/png');
        const resolvedFilename = filename || (forceTransparent ? buildExportFilename('png', 'yayoi_transparent') : buildExportFilename('png'));
        downloadBlob(blob, resolvedFilename);
        return { filename: resolvedFilename, width: exportCanvas.width, height: exportCanvas.height, clamped: exportSize.scale !== 1 };
      }, [config, createRenderList]);

      const buildSVGMarkup = useCallback(() => {
        const renderList = createRenderList();
        const shadowId = 'yayoi-shadow-filter';
        const parts = [];
        parts.push(`<?xml version="1.0" encoding="UTF-8"?>`);
        parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${config.width}" height="${config.height}" viewBox="0 0 ${config.width} ${config.height}" shape-rendering="geometricPrecision">`);

        if (config.useShadow && config.shadowBlur > 0) {
          const stdDeviation = getShadowStdDeviation(config.shadowBlur);
          parts.push(`<defs><filter id="${shadowId}" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="${fmt(stdDeviation)}" flood-color="${escapeXML(config.shadowColor)}" flood-opacity="1"/></filter></defs>`);
        }

        if (config.useBackground) {
          parts.push(`<rect width="100%" height="100%" fill="${escapeXML(config.backgroundColor)}"/>`);
        }

        const groupStyles = [];
        if (config.blendMode && config.blendMode !== 'source-over') groupStyles.push(`mix-blend-mode:${config.blendMode}`);
        groupStyles.push('isolation:isolate');
        const groupAttrs = [`opacity="${fmt(config.opacity)}"`];
        if (groupStyles.length > 0) groupAttrs.push(`style="${groupStyles.join(';')}"`);
        if (config.useShadow && config.shadowBlur > 0) groupAttrs.push(`filter="url(#${shadowId})"`);
        parts.push(`<g ${groupAttrs.join(' ')}>`);

        for (const shape of renderList) {
          const pr = shape.baseRadius * shape.scale;
          if (shape.pz < 0 || pr < 0.5) continue;

          const d = getShapePathData(shape.type, pr);
          const fillRule = getShapeFillRule(shape.type);
          const attrs = [
            `d="${d}"`,
            `fill="${escapeXML(shape.color)}"`,
            `fill-rule="${fillRule}"`,
            `transform="translate(${fmt(shape.px)} ${fmt(shape.py)}) rotate(${fmt((shape.rotation * 180) / Math.PI)})"`,
          ];

          if (config.useStroke) {
            attrs.push(`stroke="${escapeXML(config.strokeColor)}"`);
            attrs.push(`stroke-width="${getStrokeWidthForScale(shape.scale)}"`);
            attrs.push('stroke-linejoin="round"');
            attrs.push('stroke-linecap="round"');
          }

          parts.push(`<path ${attrs.join(' ')}/>`);
        }

        parts.push(`</g>`);

        if (config.showAxes) {
          const spreadXScale = config.spreadX / 100;
          const spreadYScale = config.spreadY / 100;
          const w = config.width * spreadXScale;
          const h = config.height * spreadYScale;
          const d = config.depth;
          const cx = config.width / 2;
          const cy = config.height / 2;
          const fontSize = Math.max(14, config.width / 80);
          const axes = [
            { from: [-w / 2, 0, 0], to: [w / 2, 0, 0], color: '#ff4444', label: 'X' },
            { from: [0, -h / 2, 0], to: [0, h / 2, 0], color: '#44ff44', label: 'Y' },
            { from: [0, 0, -d / 2], to: [0, 0, d / 2], color: '#4444ff', label: 'Z' },
          ];
          parts.push('<g stroke-linecap="round" stroke-linejoin="round">');
          for (const axis of axes) {
            const p1 = project(axis.from[0], axis.from[1], axis.from[2], cx, cy, config.rotationX, config.rotationY);
            const p2 = project(axis.to[0], axis.to[1], axis.to[2], cx, cy, config.rotationX, config.rotationY);
            if (p1.z <= 10 || p2.z <= 10) continue;
            parts.push(`<line x1="${fmt(p1.x)}" y1="${fmt(p1.y)}" x2="${fmt(p2.x)}" y2="${fmt(p2.y)}" stroke="${axis.color}" stroke-width="2"/>`);
            parts.push(`<text x="${fmt(p2.x)}" y="${fmt(p2.y)}" fill="${axis.color}" font-family="monospace" font-size="${fmt(fontSize)}" font-weight="700" text-anchor="middle" dominant-baseline="middle">${axis.label}</text>`);
          }
          parts.push('</g>');
        }

        parts.push('</svg>');
        return parts.join('');
      }, [config, createRenderList, project]);

      const exportSVG = useCallback(({ filename } = {}) => {
        const svgMarkup = buildSVGMarkup();
        const blob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
        const resolvedFilename = filename || buildExportFilename('svg');
        downloadBlob(blob, resolvedFilename);
        return { filename: resolvedFilename, width: config.width, height: config.height };
      }, [buildSVGMarkup, config.width, config.height]);

      const handleExportPNG = useCallback(() => {
        exportPNG().catch((error) => console.error('[YAYOI export]', error));
      }, [exportPNG]);

      const handleExportTransparentPNG = useCallback(() => {
        exportPNG({ forceTransparent: true }).catch((error) => console.error('[YAYOI export]', error));
      }, [exportPNG]);

      const handleExportSVG = useCallback(() => {
        try {
          exportSVG();
        } catch (error) {
          console.error('[YAYOI export]', error);
        }
      }, [exportSVG]);

      useEffect(() => {
        const selfTest = () => {
          const rootNode = document.getElementById('root');
          const canvasNode = canvasRef.current;
          const checks = {
            rootPresent: !!rootNode,
            canvasPresent: !!canvasNode,
            canvasContext2D: !!canvasNode?.getContext?.('2d'),
            reactLoaded: !!window.React,
            reactDomLoaded: !!window.ReactDOM,
            htmEmbedded: !!window.htm,
            exportApiPresent: true,
            exportPngPresent: true,
            exportTransparentPngPresent: true,
            exportSvgPresent: true,
            widthPositive: Number.isFinite(config.width) && config.width > 0,
            heightPositive: Number.isFinite(config.height) && config.height > 0,
            shapesArrayValid: Array.isArray(shapes),
            shapesCountMatchesSnapshot: Array.isArray(shapes) && shapes.length >= 0,
          };
          const failed = Object.entries(checks).filter(([, ok]) => !ok).map(([name]) => name);
          return {
            ok: failed.length === 0,
            failed,
            checks,
            snapshot: {
              width: config.width,
              height: config.height,
              count: shapes.length,
              layoutMode: config.layoutMode,
              seed: config.seed,
            },
          };
        };

        const publishReadiness = () => {
          const runtime = selfTest();
          const warnings = [];
          if (!window.__yayoiLoadedScripts.react) warnings.push('React CDN source was not recorded');
          if (!window.__yayoiLoadedScripts['react-dom']) warnings.push('ReactDOM CDN source was not recorded');
          warnings.push('Online access is required for React / ReactDOM at startup');
          return {
            ok: runtime.ok,
            build: YAYOI_BUILD,
            mode: 'online-publish',
            runtime,
            loadedScripts: { ...window.__yayoiLoadedScripts },
            exports: {
              png: true,
              pngTransparent: true,
              svg: true,
            },
            warnings,
          };
        };

        const api = {
          png: (options) => exportPNG(options),
          pngTransparent: (options) => exportPNG({ ...(options || {}), forceTransparent: true }),
          svg: (options) => exportSVG(options),
          snapshot: () => ({
            width: config.width,
            height: config.height,
            count: shapes.length,
            layoutMode: config.layoutMode,
            seed: config.seed,
          }),
          selfTest,
          publishReadiness,
          diagnostics: () => ({
            build: YAYOI_BUILD,
            hiddenConfig: {
              sizeModePerShapeImplemented: true,
              sizeModePerShapeExposedInUI: false,
              colorModePerShapeImplemented: true,
              colorModePerShapeExposedInUI: true,
              perShapeColorEditorExposedInUI: false,
              blendModeImplemented: true,
              blendModeExposedInUI: false,
              syncRadiusImplemented: true,
              syncRadiusExposedInUI: false,
              shadowBlurImplemented: true,
              shadowBlurExposedInUI: false,
            },
            config: {
              colorMode: config.colorMode,
              sizeMode: config.sizeMode,
              blendMode: config.blendMode,
              syncRadius: config.syncRadius,
              shadowBlur: config.shadowBlur,
              useShadow: config.useShadow,
            },
            exports: {
              png: true,
              pngTransparent: true,
              svg: true,
            },
            runtimeSources: { ...window.__yayoiLoadedScripts },
            selfTest: selfTest(),
          }),
        };
        window.YAYOI_EXPORT = api;
        if (!window.__yayoiBootLogged) {
          window.__yayoiBootLogged = true;
          setTimeout(() => {
            try {
              console.info('[YAYOI] publishReadiness', api.publishReadiness());
            } catch (error) {
              console.warn('[YAYOI] publishReadiness failed', error);
            }
          }, 0);
        }
        return () => {
          if (window.YAYOI_EXPORT === api) delete window.YAYOI_EXPORT;
        };
      }, [config.width, config.height, config.layoutMode, config.seed, shapes.length, config.colorMode, config.sizeMode, config.blendMode, config.syncRadius, config.shadowBlur, config.useShadow, exportPNG, exportSVG]);

      const endDrag = useCallback((event) => {
        const state = dragStateRef.current;
        if (event && state.pointerId !== null && event.pointerId !== state.pointerId) return;
        if (event?.currentTarget?.releasePointerCapture && state.pointerId !== null) {
          try {
            event.currentTarget.releasePointerCapture(state.pointerId);
          } catch (error) {
            // ignore invalid release during teardown
          }
        }
        dragStateRef.current = { pointerId: null, x: 0, y: 0 };
        setIsDragging(false);
      }, []);

      const handlePointerDown = useCallback((event) => {
        if (!event.isPrimary) return;
        if (event.pointerType === 'mouse' && event.button !== 0) return;
        event.preventDefault();
        dragStateRef.current = { pointerId: event.pointerId, x: event.clientX, y: event.clientY };
        setIsDragging(true);
        if (event.currentTarget?.setPointerCapture) {
          try {
            event.currentTarget.setPointerCapture(event.pointerId);
          } catch (error) {
            // ignore capture failures on unsupported browsers
          }
        }
      }, []);

      const handlePointerMove = useCallback((event) => {
        const state = dragStateRef.current;
        if (!isDragging || state.pointerId === null || event.pointerId !== state.pointerId) return;
        event.preventDefault();
        const deltaX = event.clientX - state.x;
        const deltaY = event.clientY - state.y;
        dragStateRef.current = { pointerId: state.pointerId, x: event.clientX, y: event.clientY };
        const sensitivity = 0.5;
        setConfig((prev) => ({
          ...prev,
          rotationY: (prev.rotationY + deltaX * sensitivity) % 360,
          rotationX: Math.max(-90, Math.min(90, prev.rotationX + deltaY * sensitivity)),
        }));
      }, [isDragging]);

      const handlePointerUp = useCallback((event) => {
        endDrag(event);
      }, [endDrag]);

      const handlePointerCancel = useCallback((event) => {
        endDrag(event);
      }, [endDrag]);

      useEffect(() => {
        const isEditableTarget = (target) => {
          if (!(target instanceof HTMLElement)) return false;
          const tag = target.tagName;
          return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || target.isContentEditable;
        };

        const handleKeyDown = (event) => {
          if (!(event.altKey && event.shiftKey) || event.ctrlKey || event.metaKey) return;
          if (isEditableTarget(event.target)) return;

          const key = event.key.toLowerCase();
          if (key === 'p') {
            event.preventDefault();
            exportPNG().catch((error) => console.error('[YAYOI export]', error));
          } else if (key === 't') {
            event.preventDefault();
            exportPNG({ forceTransparent: true }).catch((error) => console.error('[YAYOI export]', error));
          } else if (key === 's') {
            event.preventDefault();
            try {
              exportSVG();
            } catch (error) {
              console.error('[YAYOI export]', error);
            }
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [exportPNG, exportSVG]);

      return html`
        <div className="flex flex-col h-screen w-full bg-black text-neutral-100 overflow-hidden">
          <div className="absolute top-6 left-0 right-0 z-30 pointer-events-none flex justify-center">
            <h1 className="text-xl font-medium text-white/90 drop-shadow-md">Yayoi</h1>
          </div>

          <div className="flex-1 relative w-full overflow-hidden flex items-center justify-center">
            <div
              className="relative flex items-center justify-center p-8 w-full h-full"
              onPointerDown=${handlePointerDown}
              onPointerMove=${handlePointerMove}
              onPointerUp=${handlePointerUp}
              onPointerCancel=${handlePointerCancel}
              onPointerLeave=${handlePointerUp}
              style=${{ cursor: isDragging ? 'grabbing' : 'grab', touchAction: 'none' }}
            >
              <div
                className="relative shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-neutral-800 rounded-lg overflow-hidden pointer-events-none select-none transition-all duration-300"
                style=${{
                  aspectRatio: `${config.width}/${config.height}`,
                  maxHeight: '90%',
                  maxWidth: '90%',
                }}
              >
                ${!config.useBackground ? html`<div className="absolute inset-0 checkerboard-bg z-0 opacity-10"></div>` : null}
                <canvas
                  ref=${canvasRef}
                  width=${config.width}
                  height=${config.height}
                  className="w-full h-full object-contain relative z-10 block"
                />
              </div>
            </div>
          </div>

          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 max-w-[95vw]">
            <${Dock}
              activeTab=${activeTab}
              setActiveTab=${setActiveTab}
              onGenerate=${handleRegenerate}
              onExportPNG=${handleExportPNG}
              onExportTransparentPNG=${handleExportTransparentPNG}
              onExportSVG=${handleExportSVG}
            />
          </div>

          <div
            className="w-full bg-black/95 border-t border-neutral-800 transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)] overflow-hidden flex-none z-40"
            style=${{ height: activeTab ? `${320}px` : '0px' }}
          >
            <div className="h-full p-4 pb-20 overflow-hidden relative">
              <${ControlPanelContent}
                config=${config}
                setConfig=${setConfig}
activeTab=${activeTab}
                setActiveTab=${setActiveTab}
              />
            </div>
          </div>
        </div>
      `;
    };

    const App = () => html`
      <${ErrorBoundary}>
        <${AppContent} />
      </${ErrorBoundary}>
    `;

    const rootElement = document.getElementById('root');
    if (rootElement) ReactDOM.createRoot(rootElement).render(html`<${App} />`);
      } catch (error) {
        console.error(error);
        const fallback = document.getElementById('loading-fallback');
        if (fallback) {
          fallback.style.opacity = '1';
          fallback.innerHTML = '<div style="margin-bottom:0.75rem">INITIALIZATION FAILED</div><div style="font-size:0.8rem;opacity:0.75;max-width:36rem;padding:0 1rem;line-height:1.5">React runtime could not be loaded from the configured CDNs. This file now avoids esm.sh and Tailwind CDN, but still needs internet access for React / ReactDOM. Open the browser console for details.</div>';
        }
      }
    })();
  </script>
</body>
</html>
