name: Daily Nursing News Update
on:
  schedule:
    # 朝7時 (JST) = UTC 22時 (前日)
    - cron: '0 22 * * *'
    # 昼12時 (JST) = UTC 3時
    - cron: '0 3 * * *'
    # 夜17時 (JST) = UTC 8時
    - cron: '0 8 * * *'
  workflow_dispatch: # 手動実行用
jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4
      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 必要なライブラリのインストール
        run: pip install feedparser google-generativeai requests beautifulsoup4
      - name: AI要約プログラムの実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py
      - name: 変更されたHTMLをGitHubに保存
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nurse-news.html seen_urls.json
          git commit -m "Automated update: AI summarized nursing news" || echo "No changes to commit"
          git push
