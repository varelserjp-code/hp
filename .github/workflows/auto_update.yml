name: Auto Update Nurse News

on:
  schedule:
    # 毎日日本時間の朝7時に実行するロジック（UTCで前日22時を指定）
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動で即時実行するためのトリガー

jobs:
  update-news:
    runs-on: ubuntu-latest
    # 【メカニズム】リポジトリの設定画面を操作する手間を省くため、
    # この設計図自体に「ファイルの上書き保存権限」を付与しています。
    permissions:
      contents: write

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: pip install feedparser google-generativeai

      - name: AI要約プログラムの実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: 変更されたHTMLをGitHubに保存（自動コミット）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nurse-news.html
          git commit -m "Automated update: AI summarized nursing news" || echo "No changes to commit"
          git push
