name: knowledge-sync

on:
  repository_dispatch:
    types: [knowledge-sync]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build knowledge index page
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from html import escape

          root = Path(".")
          index_path = root / "knowledge" / "index.json"
          site_dir = root / "site"
          site_dir.mkdir(parents=True, exist_ok=True)

          items = []
          if index_path.exists():
              items = json.loads(index_path.read_text(encoding="utf-8"))

          cards = []
          for item in items:
              title = escape(str(item.get("title", "")))
              summary = escape(str(item.get("summary", "")))
              category = escape(str(item.get("category", "")))
              tags = " ".join(f'<span class="tag">{escape(str(t))}</span>' for t in item.get("tags", []))
              md_path = "/" + str(item.get("githubMdPath", "")).replace("\\", "/")
              cards.append(f"""
              <article class="card">
                <div class="meta"><span>{category}</span><span>{escape(str(item.get("updatedAt", "")))}</span></div>
                <h2><a href="{md_path}">{title}</a></h2>
                <p>{summary}</p>
                <div class="tags">{tags}</div>
              </article>
              """)

          html = f"""<!doctype html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>VARELSER Knowledge Network</title>
            <style>
              body {{ margin: 0; background: #0b0b0b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }}
              .wrap {{ max-width: 960px; margin: 0 auto; padding: 32px 20px 64px; }}
              h1 {{ font-size: 32px; margin: 0 0 8px; }}
              .lead {{ color: #aaa; margin: 0 0 24px; }}
              .grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }}
              .card {{ background: #141414; border: 1px solid #262626; border-radius: 16px; padding: 18px; }}
              .card h2 {{ font-size: 18px; line-height: 1.4; margin: 10px 0; }}
              .card a {{ color: #fff; text-decoration: none; }}
              .card a:hover {{ text-decoration: underline; }}
              .card p {{ color: #cfcfcf; line-height: 1.7; }}
              .meta {{ display: flex; justify-content: space-between; gap: 12px; color: #8f8f8f; font-size: 12px; }}
              .tags {{ display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }}
              .tag {{ border: 1px solid #333; border-radius: 999px; padding: 4px 10px; font-size: 12px; color: #ddd; }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <h1>VARELSER Knowledge Network</h1>
              <p class="lead">Google Drive から同期された知識アーカイブ</p>
              <section class="grid">
                {''.join(cards) if cards else '<p>まだ記事がありません。</p>'}
              </section>
            </main>
          </body>
          </html>"""

          (site_dir / "index.html").write_text(html, encoding="utf-8")
          PY

      - name: Copy markdown assets
        run: |
          mkdir -p site/knowledge
          cp -R knowledge/posts site/knowledge/posts || true
          cp -R knowledge/meta site/knowledge/meta || true
          cp knowledge/index.json site/knowledge/index.json || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
